<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LANHOUSE Game Net</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @font-face {
            font-family: 'Kenfolg';
            src: url('./fonts/MADEKenfolg.otf') format('opentype');
        }

        @font-face {
            font-family: 'Elicit';
            src: url('./fonts/ElicitScriptCasual.otf') format('opentype');
        }

        :root {
            --red: #ff2020;
            --cyan: #00d5d5;
            --dark: #050505;
        }

        body {
            background: #111;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            color: white;
        }

        .banner {
            max-width: 1300px;
            width: 100%;
            border: 4px solid var(--red);
            background: linear-gradient(to bottom, #000000 0%, #0a0a0a 40%, #220000 100%);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 0, 0, .4), 0 0 50px rgba(255, 0, 0, .2);
        }

        .lanhouse-title {
            font-family: 'Kenfolg';
            font-size: clamp(70px, 13vw, 180px);
            line-height: .9;
            color: white;
            letter-spacing: 8px;
            text-align: center;
            text-shadow: 3px 3px 0 #000, 6px 6px 0 var(--red), 8px 8px 0 #000;
        }

        .game-net {
            text-align: center;
            font-family: 'Elicit';
            font-size: clamp(45px, 6vw, 90px);
            color: white;
            margin-top: -20px;
            text-shadow: 3px 3px 0 var(--cyan), 5px 5px 0 var(--red);
        }

        .icon-circle {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 4px solid white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            margin: auto;
            box-shadow: 0 0 20px rgba(255,255,255,.3);
        }

        .pc-icon {
            font-size: 80px;
            color: #d7d7d7;
        }

        .sala h2 {
            color: white;
            font-size: 55px;
            margin: 0;
            font-weight: 900;
        }

        .sala span {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .phone {
            text-align: center;
            color: white;
            font-weight: 900;
            margin: 30px 0;
            font-size: clamp(45px, 8vw, 100px);
        }

        .phone i {
            color: #25D366;
        }

        .services {
            text-align: center;
            color: white;
            font-size: clamp(18px, 2vw, 30px);
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.8;
        }

        .services i {
            color: var(--cyan);
            margin-right: 6px;
        }

        .address {
            margin-top: 20px;
            text-align: center;
            color: white;
            font-size: clamp(15px, 1.8vw, 26px);
            font-weight: bold;
        }

        .divider {
            height: 3px;
            background: var(--red);
            margin: 25px 0;
        }

        .whatsapp-float {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 70px;
            height: 70px;
            background: #25D366;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 35px;
            text-decoration: none;
            box-shadow: 0 0 25px rgba(37,211,102,.6);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>

<body>

<div class="banner">

    <h1 class="lanhouse-title">LANHOUSE</h1>

    <div class="game-net">Game Net</div>

    <div class="row align-items-center mt-4">
        <div class="col-md-4 text-center mb-3">
            <div class="icon-circle">
                <i class="fa-solid fa-gamepad"></i>
            </div>
        </div>

        <div class="col-md-4 text-center mb-3">
            <i class="fa-solid fa-computer pc-icon"></i>
        </div>

        <div class="col-md-4 text-center mb-3">
            <div class="sala">
                <span>SALA</span>
                <h2>06</h2>
            </div>
        </div>
    </div>

    <div class="phone">
        <i class="fa-brands fa-whatsapp"></i>
        37 99953-5519
    </div>
  <div class="services">
        contato: contato@portaldalan.com.br
    </div>
    <div class="divider"></div>

    <div class="services">
        Digitação • Xerox • Impressão • Internet • Currículos • Outros Serviços
    </div>

    <div class="divider"></div>

    <div class="address">
        Rua José Demetrio Coelho, 866, Sala 06, Centro, Carmo do Cajuru - MG
    </div>

</div>

<a href="https://wa.me/5537999535519" class="whatsapp-float">
    <i class="fa-brands fa-whatsapp"></i>
</a>

</body>
</html>
